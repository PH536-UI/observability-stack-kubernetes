apiVersion: apps/v1
kind: Deployment
metadata:
  name: promtail
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      containers:
      - name: promtail
        image: grafana/promtail:2.9.8
